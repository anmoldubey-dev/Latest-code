; =============================================================================
; Asterisk PJSIP Configuration for LiveKit SIP Integration
; =============================================================================

; ─── 1. GLOBAL & TRANSPORT SETTINGS ──────────────────────────────────────────

[global]
type = global
user_agent = AI-CallCenter-PBX
endpoint_identifier_order = ip,username,anonymous

; FIXED: Twilio sends SIP to port 5060. We bind here to accept the public traffic.
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16
local_net = 127.0.0.1/32

; ─── 2. LIVEKIT SIP ENDPOINT ──────────────────────────────────────────────────

[livekit-sip]
type = endpoint
context = from-pstn
transport = transport-udp
disallow = all
allow = opus
allow = g722
allow = ulaw
allow = alaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
ice_support = no
dtmf_mode = rfc4733
aors = livekit-sip

[livekit-sip]
type = aor

contact = sip:livekit-sip:5060
qualify_frequency = 30
qualify_timeout = 5

[livekit-sip-identify]
type = identify
endpoint = livekit-sip
; Match incoming traffic from internal local networks
match = 127.0.0.1/32
match = 172.16.0.0/12
match = 10.0.0.0/8
match = 192.168.0.0/16


; ─── 3. TWILIO SIP TRUNK (PSTN PROVIDER) ─────────────────────────────────────

[twilio-trunk]
type = endpoint
context = from-pstn
transport = transport-udp
disallow = all
allow = ulaw
allow = alaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
dtmf_mode = rfc4733
aors = twilio-trunk
; FIXED: Removed unnecessary outbound_auth because Twilio inbound relies on IP matching.

[twilio-trunk]
type = aor
; Replace with your Twilio Termination SIP URI (optional for outbound)
contact = sip:your-domain.pstn.twilio.com:5060
qualify_frequency = 60

[twilio-identify]
type = identify
endpoint = twilio-trunk

match = 54.172.60.0/23
match = 54.244.51.0/24
match = 54.171.127.192/26
match = 34.203.250.0/23

; ─── 4. SOFTPHONE / LOCAL TEST CLIENT ────────────────────────────────────────


[softphone-auth]
type = auth
auth_type = userpass
username = testuser
password = testpass123

[softphone]
type = aor
max_contacts = 1
remove_existing = yes

[softphone]
type = endpoint
context = from-internal
transport = transport-udp
auth = softphone-auth
aors = softphone
disallow = all
allow = ulaw
allow = alaw
allow = g722
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
dtmf_mode = rfc4733


[general]
static = yes
writeprotect = no
clearglobalvars = no

[globals]
LIVEKIT_SIP_ENDPOINT = livekit-sip
MAX_CALL_DURATION = 3600    
RING_TIMEOUT = 30           

; =============================================================================
; [from-pstn] — Inbound from Twilio
; =============================================================================
[from-pstn]
exten => _X.,1,NoOp(======================================)
 same => n,NoOp(===  INCOMING Twilio Call Start      ===)
 same => n,NoOp(Caller ID: ${CALLERID(num)})
 same => n,NoOp(Dialed Extension: ${EXTEN})
 same => n,NoOp(Unique Call ID: ${UNIQUEID})
 same => n,NoOp(======================================)

 same => n,Set(TIMEOUT(absolute)=${MAX_CALL_DURATION})
 same => n,Answer()
 same => n,Wait(0.2)
 
; ADDED: Dial LiveKit SIP Server (Attempt 1)
 same => n,NoOp(Routable Check: Forwarding Call to LiveKit-SIP)
 same => n,Dial(PJSIP/${EXTEN}@${LIVEKIT_SIP_ENDPOINT},${RING_TIMEOUT},g)

; If Dial finishes, evaluate the outcome
 same => n,NoOp(Dial Finished. Status: ${DIALSTATUS})
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?success)
 
 same => n,GotoIf($["${DIALSTATUS}" = "CHANUNAVAIL"]?retry)
 same => n,GotoIf($["${DIALSTATUS}" = "CONGESTION"]?retry)
 same => n,Goto(evaluate_fail)

 same => n(retry),NoOp(LiveKit SIP unavailable. Retrying exactly ONCE in 2 seconds...)
 same => n,Wait(2)
 same => n,Dial(PJSIP/${EXTEN}@${LIVEKIT_SIP_ENDPOINT},${RING_TIMEOUT},g)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?success)
 same => n,NoOp(Final Retry failed. Falling back to error causes: ${DIALSTATUS})

 same => n(evaluate_fail),NoOp(Evaluating permanent failure: ${DIALSTATUS})
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?noanswer)
 same => n,Goto(chanunavail)

; --- SCENARIOS ---
 same => n(success),NoOp(Call ended gracefully by User or AI Worker.)
 same => n,Hangup(16) ; Normal Clearing

 same => n(busy),NoOp(LiveKit SIP rejected the call (BUSY).)
 same => n,Playback(all-circuits-busy-now)
 same => n,Hangup(17) ; User busy

 same => n(noanswer),NoOp(LiveKit SIP missed the call (NO ANSWER).)
 same => n,Playback(vm-sorry)
 same => n,Hangup(19) ; No answer

 same => n(chanunavail),NoOp(LiveKit SIP permanently unreachable.)
 same => n,Playback(stutter)
 same => n,Hangup(38) ; Network out of order

; =============================================================================
; [from-internal] — Testing
; =============================================================================
[from-internal]
exten => _X.,1,NoOp(Local SIP client test to LK-SIP)
 same => n,Set(TIMEOUT(absolute)=${MAX_CALL_DURATION})
 same => n,Answer()
 same => n,Dial(PJSIP/${EXTEN}@${LIVEKIT_SIP_ENDPOINT},${RING_TIMEOUT},g)
 same => n,Hangup()

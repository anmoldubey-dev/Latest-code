# livekit.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Self-hosted LiveKit server configuration.
# Run with Docker (no account / no cloud login required):
#
#   docker run -d \
#     --name livekit-server \
#     -p 7880:7880 \
#     -p 7881:7881 \
#     -p 7882:7882/udp \
#     -v $(pwd)/livekit.yaml:/livekit.yaml \
#     livekit/livekit-server \
#     --config /livekit.yaml
#
# Or without a config file (minimal one-liner):
#
#   docker run -d --name livekit-server \
#     -p 7880:7880 -p 7881:7881 -p 7882:7882/udp \
#     -e LIVEKIT_KEYS="devkey:devsecret" \
#     livekit/livekit-server \
#     --dev
#
# After starting, the server listens on:
#   ws://localhost:7880   — WebRTC signaling + media
#   http://localhost:7880 — REST API
#
# Set these env vars in backend/.env (or export before starting backend):
#   LIVEKIT_URL=ws://localhost:7880
#   LIVEKIT_API_KEY=devkey
#   LIVEKIT_API_SECRET=devsecret
# ─────────────────────────────────────────────────────────────────────────────

# HTTP + WebRTC signaling port
port: 7880

# RTC media ports
rtc:
  tcp_port: 7881
  udp_port: 7882
  # Bind to all interfaces so Docker containers can reach the server
  interfaces:
    includes:
      - lo0
      - eth0
      - en0

# API keys (key: secret pairs)
# In production: use strong random secrets and rotate regularly.
keys:
  devkey: devsecret

# Logging
logging:
  json: false
  level: info

# TURN server (optional — LiveKit has its own built-in TURN relay)
# Set enabled: true only if you have a separate coturn server.
turn:
  enabled: false
  # domain: turn.yourdomain.com
  # cert_file: /etc/livekit/turn.crt
  # key_file:  /etc/livekit/turn.key

# Room defaults
room:
  # Auto-create rooms on first join (no pre-creation step needed)
  auto_create: true
  # Empty rooms are deleted after this many seconds (0 = never)
  empty_timeout: 300


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { max-width: 80%; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .user-msg { background-color: #e0f2fe; margin-left: auto; text-align: right; }
        .ai-msg { background-color: #f0fdf4; margin-right: auto; }
        /* Custom scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center p-5">

    <h1 class="text-3xl font-bold mb-5 text-gray-800">🎙️ Voice AI Console</h1>

    <div class="w-full max-w-5xl bg-white rounded-xl shadow-lg flex overflow-hidden h-[650px]">
        
        <div class="w-1/3 bg-gray-50 p-6 border-r border-gray-200 flex flex-col">
            <h2 class="font-bold text-xl text-gray-700 mb-6">🎛️ Control Panel</h2>
            
            <label class="text-xs font-bold text-gray-500 uppercase mb-2">Select Input Audio</label>
            <select id="fileDropdown" onchange="previewAudio()" class="w-full p-3 border border-gray-300 rounded-lg mb-4 bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="" disabled selected>-- Select a .wav file --</option>
            </select>

            <div id="previewContainer" class="hidden mb-6 transition-all duration-300">
                <label class="text-xs font-bold text-gray-500 uppercase mb-1">Preview Selection</label>
                <audio id="inputPlayer" controls class="w-full rounded-lg shadow-sm"></audio>
            </div>

            <button onclick="processAudio()" id="sendBtn" class="w-full bg-blue-600 text-white p-4 rounded-lg hover:bg-blue-700 transition font-bold shadow-md flex justify-center items-center gap-2">
                <span>⚡ Process Audio</span>
            </button>

            <div id="status" class="mt-4 text-sm font-medium text-center text-blue-600 hidden animate-pulse">
                Processing...
            </div>

            <div class="mt-auto text-xs text-center text-gray-400">
                Backend Status: <span id="connectionStatus" class="text-green-500 font-bold">● Online</span>
            </div>
        </div>

        <div class="w-2/3 p-6 flex flex-col bg-white">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 class="font-bold text-xl text-gray-700">💬 Conversation History</h2>
                <button onclick="clearChat()" class="text-xs text-red-500 hover:underline">Clear History</button>
            </div>
            
            <div id="chatHistory" class="flex-1 overflow-y-auto p-4 bg-gray-50 rounded-lg border border-gray-100">
                <div id="emptyState" class="h-full flex flex-col items-center justify-center text-gray-400 opacity-60">
                    <svg class="w-16 h-16 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    <p>Select a file to start the conversation</p>
                </div>
            </div>

            <div id="responseArea" class="mt-4 hidden border-t pt-4 bg-green-50 p-3 rounded-lg border border-green-100">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-bold text-green-700 uppercase">🔊 AI Voice Response</label>
                    <span class="text-xs text-green-600 bg-green-200 px-2 py-0.5 rounded-full">LUNARIS</span>
                </div>
                <audio id="outputPlayer" controls class="w-full h-10"></audio>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        // 1. Load available files
        async function loadFiles() {
            try {
                const res = await fetch(`${API_URL}/list-assets`);
                const data = await res.json();
                const dropdown = document.getElementById("fileDropdown");
                
                // Keep default option
                dropdown.innerHTML = '<option value="" disabled selected>-- Select a .wav file --</option>';
                
                data.files.forEach(f => {
                    const option = document.createElement("option");
                    option.value = f;
                    option.text = f;
                    dropdown.appendChild(option);
                });
            } catch (e) {
                console.error("Backend offline?", e);
                document.getElementById("connectionStatus").innerHTML = '<span class="text-red-500">● Offline</span>';
            }
        }
        loadFiles();

        // 2. Play Selected Audio (New Function)
        function previewAudio() {
            const filename = document.getElementById("fileDropdown").value;
            const player = document.getElementById("inputPlayer");
            const container = document.getElementById("previewContainer");

            if (filename) {
                player.src = `${API_URL}/assets/${filename}`;
                container.classList.remove("hidden");
                // Optional: Auto-play the input so you hear what you picked
                // player.play(); 
            }
        }

        function clearChat() {
            document.getElementById("chatHistory").innerHTML = `
                <div id="emptyState" class="h-full flex flex-col items-center justify-center text-gray-400 opacity-60">
                    <svg class="w-16 h-16 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    <p>Select a file to start the conversation</p>
                </div>`;
            document.getElementById("responseArea").classList.add("hidden");
        }

        // 3. Process & Chat
        async function processAudio() {
            const filename = document.getElementById("fileDropdown").value;
            if (!filename) {
                alert("Please select a file first!");
                return;
            }

            const btn = document.getElementById("sendBtn");
            const status = document.getElementById("status");
            const chatBox = document.getElementById("chatHistory");
            const emptyState = document.getElementById("emptyState");
            const outputPlayer = document.getElementById("outputPlayer");
            const responseArea = document.getElementById("responseArea");

            // UI State: Loading
            btn.disabled = true;
            btn.classList.add("opacity-50", "cursor-not-allowed");
            status.classList.remove("hidden");
            status.innerHTML = "⏳ <b>Processing...</b> <br><span class='text-xs'>STT → Logic → TTS</span>";

            try {
                const res = await fetch(`${API_URL}/process-audio`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ filename })
                });

                if (!res.ok) throw new Error("Backend Error");

                const data = await res.json();

                // Remove empty state
                if (emptyState) emptyState.remove();

                // Append User Transcript
                chatBox.innerHTML += `
                    <div class="flex flex-col items-end animate-fade-in-up">
                        <div class="chat-bubble user-msg shadow-sm">
                            <p class="text-xs font-bold text-blue-800 mb-1">You</p>
                            <p class="text-gray-800">${data.transcript}</p>
                        </div>
                    </div>`;

                // Append AI Response
                chatBox.innerHTML += `
                    <div class="flex flex-col items-start animate-fade-in-up">
                        <div class="chat-bubble ai-msg shadow-sm border border-green-100">
                            <p class="text-xs font-bold text-green-800 mb-1">AI (LUNARIS)</p>
                            <p class="text-gray-800">${data.ai_response}</p>
                            <p class="text-[10px] text-gray-400 mt-2 text-right">Processed in ${data.processing_time.toFixed(2)}s</p>
                        </div>
                    </div>`;

                // Play Response
                responseArea.classList.remove("hidden");
                outputPlayer.src = `${API_URL}${data.audio_url}`;
                outputPlayer.play();

                // Scroll to bottom
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (err) {
                alert("Error: " + err);
            } finally {
                btn.disabled = false;
                btn.classList.remove("opacity-50", "cursor-not-allowed");
                status.classList.add("hidden");
            }
        }
    </script>
</body>
</html>
